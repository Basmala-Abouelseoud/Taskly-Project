<div class="flex flex-col gap-1.5 w-full">
  <label [for]="id" class="text-[11px] font-semibold uppercase tracking-widest text-navy">
    {{ label }}
  </label>
  
  <div class="relative w-full">
    <input
      [id]="id"
      [type]="showPassword ? 'text' : type"
      [placeholder]="placeholder"
      [formControl]="$any(control)"
      class="w-full rounded-xl border border-border/60 bg-surface-low px-4 py-3.5 text-sm text-navy outline-none placeholder:text-gray/50 focus:ring-2 focus:ring-primary/30"
      [class.border-error]="isInvalid"
    />
@if (type === 'password') {
  <button 
    type="button" 
    (click)="showPassword = !showPassword"
    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
    <i class="fa-regular w-5 text-center" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
  </button>
}
  </div>
</div>
